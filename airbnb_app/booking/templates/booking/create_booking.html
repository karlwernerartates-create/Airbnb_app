<h1>Create Booking</h1>

<form method="POST">
  {% csrf_token %}

  <label>Email</label>
  <input type="email" name="email" required />

  <label>Property</label>
  <select name="property_id">
    {% for property in properties %}
      <option value="{{ property.id }}">
        {{ property.name }}
      </option>
    {% endfor %}
  </select>

  <button type="submit">Submit</button>
</form>
