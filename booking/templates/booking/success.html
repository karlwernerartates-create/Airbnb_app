<!DOCTYPE html>

<html>
<head>
    <title>Booking Successful</title>


<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .success-card {
        background: white;
        padding: 40px;
        width: 450px;
        text-align: center;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .checkmark {
        font-size: 60px;
        color: #22c55e;
        margin-bottom: 10px;
    }

    h1 {
        color: #333;
        margin-bottom: 15px;
    }

    p {
        color: #666;
        margin-bottom: 25px;
    }

    a {
        display: inline-block;
        text-decoration: none;
        background-color: #2563eb;
        color: white;
        padding: 12px 20px;
        border-radius: 6px;
        font-weight: bold;
    }

    a:hover {
        background-color: #1d4ed8;
    }
</style>


</head>
<body>

<div class="success-card">
    <div class="checkmark">✓</div>


<h1>Booking Successful</h1>

<p>
    Your booking has been submitted successfully.
    The booking information has been saved and a notification email has been sent.
</p>

<a href="/">Create Another Booking</a>


</div>

</body>
</html>
