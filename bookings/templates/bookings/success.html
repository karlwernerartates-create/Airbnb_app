<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    <style>
        :root {
            --accent: #ff5a5f;
            --accent-dark: #e0484d;
            --success: #008a05;
            --text: #222222;
            --muted: #717171;
            --border: #dddddd;
            --bg: #f7f7f7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            padding: 40px 32px;
            text-align: center;
        }

        .check {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 138, 5, 0.1);
            border-radius: 50%;
            color: var(--success);
            font-size: 1.75rem;
            line-height: 1;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        p {
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.15s ease;
        }

        .btn:hover { background: var(--accent-dark); }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .card {
                padding: 32px 20px;
                border-radius: 10px;
            }
            h1 { font-size: 1.25rem; }
            .btn {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="check">&#10003;</div>
    <h1>Booking Submitted Successfully!</h1>
    <p>Thanks &mdash; we've received your booking and sent a confirmation.</p>
    <a class="btn" href="{% url 'booking_form' %}">Make Another Booking</a>
</div>

</body>
</html>
